# Prefix key to Ctrl-Space (many terminals send it as C-@ / NUL)
unbind C-b
set -g prefix C-@
bind C-@ send-prefix
bind C-Space send-prefix
unbind Space

# Better defaults
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-clipboard on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 0

# Keep working directory when creating panes/windows
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style navigation and resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quality-of-life binds
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Vi mode for copy/paste
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g pane-border-style 'fg=#585b70'
set -g pane-active-border-style 'fg=#89b4fa'
set -g window-style 'fg=#7f849c,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'
set -g @catppuccin_uptime_text " #(uptime | sed 's/^.*up *//' | sed 's/, *[0-9][0-9]* users\\{0,1\\}.*//' | sed 's/ day[s]*, /d /' | sed 's/:/h /' | sed 's/$/m/')"
set -g status-right-length 160
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize tmux plugin manager (keep at end)
run '~/.tmux/plugins/tpm/tpm'
